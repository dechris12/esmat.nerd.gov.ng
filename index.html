<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://docs.google.com" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify NDN</title>

<style>
        body { 
            font-family: "Times New Roman", serif; 
            background-color: #fff; 
            color: #000; 
            margin: 0; 
            padding: 10px; 
            display: block; 
        }
        
        #app { max-width: 800px; width: 100%; margin: 0; }
        .header { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .ndn { font-size: 15px; margin-bottom: 10px; }
        hr { border: 0; border-top: 1px solid #ccc; margin: 10px 0; }
        
        .details p { margin: 2px 0; font-size: 15px; line-height: 1.2; }
        .details strong { font-weight: bold; }
        
        .compliance { margin-top: 20px; }
        .compliance-label { font-size: 10px; font-weight: bold; display: block; margin-bottom: 15px; }
        .compliance ul { list-style: disc; padding-left: 20px; margin: 0; }
        .compliance li { font-size: 15px; margin-bottom: 2px; }
        .status-badge { background-color: #16A34A; color: black; padding: 0px 4px; font-weight: normal; }

        .docs { margin-top: 20px; }
        .docs-title { font-weight: bold; font-size: 16px; margin-bottom: 5px; color: #000; }
        .docs ul { list-style: disc; padding-left: 20px; margin: 0; }
        .docs li { margin-bottom: 0px; line-height: 1.1; } 
        .docs a { color: #0000EE; text-decoration: underline; font-size: 15px; cursor: pointer; }

        .error { text-align: center; margin-top: 50px; font-family: Arial, sans-serif; }
        .loading { text-align: left; color: #999; margin-top: 50px; }
    </style>
</head>
<body>

<div id="app">
    <div id="content" class="loading">Searching record...</div>
</div>

<script>
    const SHEET_ID = '1RBpClxl8hIRW3Y0PJdClYRebtGlYu_yJE7IWGVU_7to'; 
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');

    let storedTitle = "";

    function toInitialCase(str) {
        if (!str) return 'N/A';
        return str.toString().toLowerCase().split(' ').map(word => 
            word.charAt(0).toUpperCase() + word.slice(1)
        ).join(' ');
    }

    // New Formatting Function for YYYY-MM-DD hh-mm-ss
    function formatSubmissionDate(dateVal) {
        if (!dateVal || dateVal === 'N/A') return 'N/A';
        
        const d = new Date(dateVal);
        if (isNaN(d.getTime())) return dateVal; // Fallback if parsing fails

        const YYYY = d.getFullYear();
        const MM = String(d.getMonth() + 1).padStart(2, '0');
        const DD = String(d.getDate()).padStart(2, '0');
        const hh = String(d.getHours()).padStart(2, '0');
        const mm = String(d.getMinutes()).padStart(2, '0');
        const ss = String(d.getSeconds()).padStart(2, '0');

        return `${YYYY}-${MM}-${DD} ${hh}-${mm}-${ss}`;
    }

    function viewSystemGenerated() {
        const win = window.open("", "_blank");
        win.document.write(`<html><head><title>Error 404</title></head><body><h1>Error 404 - Not Found</h1></body></html>`);
        win.document.close();
    }

    async function verifyUser() {
        const content = document.getElementById('content');
        if (!userId) {
            content.innerHTML = '<div class="error"><h2>❌ No ID Provided</h2></div>';
            return;
        }

        try {
            const query = encodeURIComponent(`SELECT * WHERE A = '${userId}'`);
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&tq=${query}`;

            const response = await fetch(url);
            const text = await response.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            const rows = json.table.rows;

            if (rows && rows.length > 0) {
                const match = rows[0];
                
                // Get the raw value and format it
                const dateRaw = match.c[7]?.f || match.c[7]?.v || 'N/A';
                const formattedDate = formatSubmissionDate(dateRaw);

                const title = (match.c[1]?.v || 'N/A').toUpperCase();
                const studentName = toInitialCase(match.c[2]?.v);
                const institution = toInitialCase(match.c[3]?.v);
                const faculty = toInitialCase(match.c[4]?.v);
                const department = toInitialCase(match.c[5]?.v);
                const subType = toInitialCase(match.c[6]?.v);
                const fileId = match.c[8]?.v || null;

                storedTitle = title;
                const driveLink = fileId ? `https://drive.google.com/file/d/${fileId}/preview` : "#";

                content.innerHTML = `
                    <div class="header">NERD Compliance Verification</div>
                    <div class="ndn"><strong>NDN:</strong> ${userId}</div>
                    <hr>
                    <div class="details">
                        <p><strong>Title:</strong> <strong>${title}</strong></p>
                        <p><strong>Student name:</strong> ${studentName}</p>
                        <p><strong>Institution:</strong> ${institution}</p>
                        <p><strong>Faculty:</strong> ${faculty}</p>
                        <p><strong>Department:</strong> ${department}</p>
                        <p><strong>Submission Type:</strong> ${subType}</p>
                        <p><strong>Date of Submission:</strong> ${formattedDate}</p>
                    </div>
                    
                    <div class="compliance">
                        <span class="compliance-label">Compliance</span>
                        <ul>
                            <li>NCVS Compliance: <i>Not enforced</i></li>
                            <li>Academic report submission: <span class="status-badge">Complied</span></li>
                        </ul>
                    </div>

                    <div class="docs">
                        <div class="docs-title">Documents:</div>
                        <ul>
                            <li><a href="${driveLink}" target="_blank">${fileId ? 'Original Upload' : 'Original Upload (Not Found)'}</a></li>
                            <li><a onclick="viewSystemGenerated()">System Generated PDF</a></li>
                        </ul>
                    </div>
                `;
                content.className = ""; 
            } else {
                content.innerHTML = `<div class="error"><h2>❌ Verification Failed</h2></div>`;
            }
        } catch (e) {
            content.innerHTML = '<div class="error"><h2>⚠️ Connection Error</h2></div>';
        }
    }

    verifyUser();
</script>

</body>
</html>
