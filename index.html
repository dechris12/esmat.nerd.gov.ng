<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NERD Compliance Verification</title>
    <style>
        body { font-family: "Times New Roman", serif; background-color: #fff; color: #000; margin: 0; padding: 20px; display: flex; justify-content: center; }
        #app { max-width: 800px; width: 100%; }
        
        .header { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .ndn { font-size: 15px; margin-bottom: 10px; }
        hr { border: 0; border-top: 1px solid #ccc; margin: 10px 0; }
        
        .details p { margin: 2px 0; font-size: 15px; line-height: 1.2; }
        .details strong { font-weight: bold; }
        
        /* Compliance Section */
        .compliance { margin-top: 20px; }
        .compliance-label { 
            font-size: 10px; 
            font-weight: bold; 
            display: block; 
            margin-bottom: 15px; 
        }
        .compliance ul { 
            list-style: disc; 
            padding-left: 30px; 
            margin: 0;
        }
        .compliance li { font-size: 15px; margin-bottom: 2px; }
        .status-badge { background-color: #2e7d32; color: black; padding: 0px 4px; font-weight: normal; }

        /* Documents Section */
        .docs { margin-top: 20px; }
        .docs-title { font-weight: bold; font-size: 16px; margin-bottom: 5px; color: #000; }
        .docs ul { list-style: disc; padding-left: 30px; margin: 0; }
        .docs li { margin-bottom: 0px; line-height: 1.1; } 
        .docs a { color: #0000EE; text-decoration: underline; font-size: 15px; cursor: pointer; }

        .error { text-align: center; margin-top: 50px; font-family: Arial, sans-serif; }
        .loading { text-align: center; color: #999; margin-top: 50px; }
    </style>
</head>
<body>

<div id="app">
    <div id="content" class="loading">Searching record...</div>
</div>

<script>
    // 1. CONFIGURATION
    const SHEET_ID = '1RBpClxl8hIRW3Y0PJdClYRebtGlYu_yJE7IWGVU_7to'; 
    
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');

    function toInitialCase(str) {
        if (!str) return 'N/A';
        return str.toString().toLowerCase().replace(/\b\w/g, char => char.toUpperCase());
    }

    // Function to open System Generated Text or Professional Error
    function viewSystemGenerated(text, title) {
        const win = window.open("", "_blank");
        
        // Check if text indicates a failure
        const isError = text.toLowerCase().includes("failed") || text.toLowerCase().includes("not a pdf");
        
        const displayHeader = isError ? "Error 404 - Not Found" : title;
        const displayText = isError ? "The document you are looking for may have been removed or re-named. Please contact the web site owner for further assistance." : text;
        const textStyle = isError ? "font-size: 12px; margin-top: 15px; display: block;" : "font-size: 14px;";

        win.document.write(`
            <html>
            <head>
                <title>${displayHeader}</title>
                <style>
                    body { font-family: "Times New Roman", serif; padding: 40px; line-height: 1.6; color: #000; max-width: 800px; margin: auto; }
                    .header { font-size: 28px; font-weight: bold; border-bottom: 1px solid #000; padding-bottom: 10px; margin-bottom: 10px; }
                    pre { white-space: pre-wrap; word-wrap: break-word; font-family: inherit; ${textStyle} }
                </style>
            </head>
            <body>
                <div class="header">${displayHeader}</div>
                <pre>${displayText}</pre>
            </body>
            </html>
        `);
        win.document.close();
    }

    async function verifyUser() {
        const content = document.getElementById('content');

        if (!userId) {
            content.innerHTML = '<div class="error"><h2>❌ No ID Provided</h2><p>Please scan a valid QR code.</p></div>';
            return;
        }

        try {
            const response = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`);
            const text = await response.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            const rows = json.table.rows;

            const match = rows.find(r => r.c[0]?.v == userId);

            if (match) {
                const rawDate = match.c[7]?.f || match.c[7]?.v || 'N/A';
                
                const title = (match.c[1]?.v || 'N/A').toUpperCase();
                const studentName = toInitialCase(match.c[2]?.v);
                const institution = toInitialCase(match.c[3]?.v);
                const faculty = toInitialCase(match.c[4]?.v);
                const department = toInitialCase(match.c[5]?.v);
                const subType = toInitialCase(match.c[6]?.v);
                
                // New Data Columns
                const fileId = match.c[8]?.v || null;
                const extractedText = match.c[9]?.v || "No text available for this record.";

                const driveLink = fileId ? `https://drive.google.com/uc?id=${fileId}&export=view` : "#";

                content.innerHTML = `
                    <div class="header">NERD Compliance Verification</div>
                    <br> <div class="ndn"><strong>NDN:</strong> ${userId}</div>
                    <hr>
                    <div class="details">
                        <p><strong>Title:</strong> <strong>${title}</strong></p>
                        <p><strong>Student name:</strong> ${studentName}</p>
                        <p><strong>Institution:</strong> ${institution}</p>
                        <p><strong>Faculty:</strong> ${faculty}</p>
                        <p><strong>Department:</strong> ${department}</p>
                        <p><strong>Submission Type:</strong> ${subType}</p>
                        <p><strong>Date of Submission:</strong> ${rawDate}</p>
                    </div>
                    
                    <div class="compliance">
                        <span class="compliance-label">Compliance</span>
                        <ul>
                            <li>NCVS Compliance: <i>Not enforced</i></li>
                            <li>Academic report submission: <span class="status-badge">Complied</span></li>
                        </ul>
                    </div>

                    <div class="docs">
                        <div class="docs-title">Documents:</div>
                        <ul>
                            <li><a href="${driveLink}" target="_blank">${fileId ? 'Original Upload' : 'Original Upload (Not Found)'}</a></li>
                            <li><a onclick="viewSystemGenerated(\`${extractedText.replace(/`/g, '\\`')}\`, '${title}')">System Generated PDF</a></li>
                        </ul>
                    </div>
                `;
                content.className = ""; 
            } else {
                content.innerHTML = `<div class="error"><h2>❌ Verification Failed</h2><p>Record ${userId} not found in our database.</p></div>`;
            }
        } catch (e) {
            content.innerHTML = '<div class="error"><h2>⚠️ Connection Error</h2><p>Could not reach the database.</p></div>';
        }
    }

    verifyUser();
</script>

</body>
</html>
